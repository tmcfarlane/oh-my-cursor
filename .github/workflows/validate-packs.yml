name: validate-packs

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
      - "registry/**"
      - "packages/**"
      - "scripts/validate-packs.mjs"
      - "scripts/generate-manifests.mjs"
      - "plugin.json"
      - "skills.json"
      - "install.sh"
      - "agents/**"
      - "rules/**"
      - "commands/**"
      - "hooks/**"
      - "hooks.json"
      - "permissions.json"
      - ".github/workflows/validate-packs.yml"
  pull_request:
    paths:
      - "packs/**"
      - "registry/**"
      - "packages/**"
      - "scripts/validate-packs.mjs"
      - "scripts/generate-manifests.mjs"
      - "plugin.json"
      - "skills.json"
      - "install.sh"
      - "agents/**"
      - "rules/**"
      - "commands/**"
      - "hooks/**"
      - "hooks.json"
      - "permissions.json"
      - ".github/workflows/validate-packs.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Zero-dependency scripts — no install step needed.
      - name: Validate pack manifests, contents, and model slugs
        run: node scripts/validate-packs.mjs
      - name: Check generated manifests are up to date
        run: node scripts/generate-manifests.mjs --check

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Engine tests include parity against install.sh (needs bash, present on ubuntu).
      - name: Test installer engine (@oh-my-cursor/core)
        run: node --test packages/core/test/install.test.mjs
